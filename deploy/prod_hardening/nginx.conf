worker_processes 1;

error_log logs/error.log;
error_log logs/error.log notice;
error_log logs/error.log info;

pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name 192.168.0.75 192.168.8.75 localhost DESKTOP-6NUDLK6;

        allow 192.168.0.0/24;
        allow 192.168.8.0/24;
        deny all;

        access_log logs/medcenter_access.log;
        error_log logs/medcenter_error.log;

        location /static/ {
            alias C:/Users/РевмаМед10/PycharmProjects/Medical_center/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/temp_docs/ {
            deny all;
            return 403;
        }

        location /media/ {
            alias C:/Users/РевмаМед10/PycharmProjects/Medical_center/media/;
            expires 30d;
        }

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
        }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
