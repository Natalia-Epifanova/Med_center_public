{% extends "timetable/base.html" %}
{% block header %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-6">Ревмамед</h1>
    <p class="lead">Информация о профиле</p>
</div>
{% endblock %}

{% block content %}
<div class="album py-5">
    <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            <div class="col">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Email: {{ object.email }}</h5>
                        <p class="card-title">Телефон: {{ object.phone }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="btn-group">
                                <a class="p-2 btn btn-outline-primary" href="{% url 'users:edit_profile' object.pk %}">Редактировать профиль</a>
                                <a class="btn btn-primary" href="{% url 'timetable:home' %}">Назад</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>
{% endblock %}
